<!DOCTYPE html>

<body>
<h2>Bracket Indexing</h2>
 
    <p>JavaScript array elements are accessed using numeric indexes (starting from 0).</p>
 
    Display value of 1st Car:
<p id = "demo"></p>
<script>

        const cars = ["Saab", "Volvo", "BMW"]

        document.getElementById("demo").innerHTML = cars[0];
</script>
<br>

    Display all cars
<p id = "demo2"></p>
<script>

        const cars1 = ["Saab", "Volvo", "BMW"];

        document.getElementById("demo2").innerHTML = car1;
</script>
 
    Display array as a string
<p id = "demo3"></p>
<script></script>
</body>
</html>
