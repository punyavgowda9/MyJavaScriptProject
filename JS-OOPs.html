<body>
    <script>
        function OOPJS()
        {
            class Animal{
                constructor(name)
                {
                    this.name=name;
                }
                makeSound()
                {
                    console.log('$(this.name)makes a noise');
                }
            }
            class Dog extends Animal{
                constructor(name){
                    super{name};
                }
            }
        }
    </script>
