<!DOCTYPE html>
<html lang="en">
<head>
,<script>
    function toCelcius(Fahrenheit) { return (5/9) * (Fahrenheit - 32);}
    document.getElementById("degree").innerHTML = toCelcius(210);
</script>
</head>
<body>
<h1>Javascript Functions</h1>
 
<p>Call a function which performs a calculation and returns the result:</p>
 
<p id = "demo"></p>
<br>
<p id = "degree">Degrees</p>
<script>
    function myFunction(p1,p2)
    {
        return p1 * p2;
    }
    let result = myFunction(4, 3);
    document.getElementById("demo").innerHTML = result;
 
    document.getElementById("degree").innerHTML = toCelcius(210);
 
    document.getElementById("degree").innerHTML = toCelcius;
</script>
</body>
</html>
